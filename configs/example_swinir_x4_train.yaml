# SimpleSR SwinIR x4 训练示例配置。
# 使用方式示例：
#   python train.py -opt configs/example_swinir_x4_train.yaml

exp_name: swinir_x4_example
output_dir: D:\codes\SimpleSR\output
scale: 4
manual_seed: ~

model_type: SwinIRModel
model:
  name: ${model_type}
  path: simplesr.models.base_sr_model.SRModel

# 可选路径配置。
# path:
#   resume_ckpt: D:\codes\SimpleSR\output\swinir_x4_example\train_xxx\checkpoints\5000.state
#   pretrain_network_g: D:\codes\SimpleSR\pretrained\SwinIR_x4.pth
#   experiments_root: D:\codes\SimpleSR\output\swinir_x4_example\custom_train_dir

datasets:
  train:
    name: train_set
    path: simplesr.data.dataset.PairedImageDataset
    kwargs:
      dataroot_gt: D:\path\to\train\HR
      dataroot_lq: D:\path\to\train\LR_x4
      phase: train
      scale: ${scale}
      gt_size: 256
      use_augment: true
      io_backend_opt:
        type: disk
    dataset_enlarge_ratio: 1
    batch_size_per_gpu: 8
    num_worker_per_gpu: 4
    prefetch_mode: cpu
    num_prefetch_queue: 1
    pin_memory: true
    persistent_workers: false

  val:
    name: val_set
    path: simplesr.data.dataset.PairedImageDataset
    kwargs:
      dataroot_gt: D:\path\to\val\HR
      dataroot_lq: D:\path\to\val\LR_x4
      phase: val
      scale: ${scale}
      use_augment: false
      io_backend_opt:
        type: disk
    batch_size: 4
    num_worker: 2
    pin_memory: true

network_g:
  name: SwinIR
  path: simplesr.networks.SwinIR.SwinIR
  kwargs:
    upscale: ${scale}
    in_chans: 3
    img_size: 64
    window_size: 8
    img_range: 1.0
    depths: [6, 6, 6, 6, 6, 6]
    embed_dim: 180
    num_heads: [6, 6, 6, 6, 6, 6]
    mlp_ratio: 2
    upsampler: pixelshuffle
    resi_connection: 1conv

train:
  ema_decay: 0.999
  total_iter: 1000000
  warmup_iter: -1

  pixel_opt:
    path: simplesr.losses.basic_loss.L1Loss
    kwargs:
      loss_weight: 1.0
      reduction: mean

  optim_g:
    type: Adam
    lr: 2.0e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

val:
  val_freq: 5000
  save_img: false
  pbar: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: ${scale}
      test_y_channel: false
      better: higher
    ssim:
      type: calculate_ssim
      crop_border: ${scale}
      test_y_channel: false
      better: higher

log_settings:
  print_freq: 100
  save_checkpoint_freq: 5000
  wandb:
    project: simplesr
    resume_id: ~
    mode: disabled
